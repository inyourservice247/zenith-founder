<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zenith — Founder Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
height:100%;
font-family:'Inter',sans-serif;
background:#0B1F4A;
color:#fff;
}

/* ================= VIDEO BACKGROUND ================= */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
overflow:hidden;
}

.video-bg video{
width:100%;
height:100%;
object-fit:cover;
}

.video-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
180deg,
rgba(5,15,40,0.65) 0%,
rgba(5,15,40,0.85) 100%
);
z-index:-1;
}

/* ================= LOGIN PAGE ================= */

.login-page{
min-height:100dvh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:24px 18px;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:28px;
}

.logo-mark{
width:36px;
height:36px;
background:#1A56DB;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:16px;
}

.logo-name{
font-size:14px;
font-weight:600;
}

.logo-sub{
font-size:10px;
opacity:.45;
letter-spacing:1.4px;
margin-top:2px;
}

/* CARD */

.card{
width:100%;
max-width:360px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.12);
border-radius:18px;
padding:26px 22px;
}

.card-title{
font-size:18px;
font-weight:700;
text-align:center;
margin-bottom:4px;
}

.card-sub{
font-size:12px;
opacity:.55;
text-align:center;
margin-bottom:20px;
}

/* INPUT */

.form-group{
margin-bottom:12px;
}

.form-group input{
width:100%;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.14);
border-radius:10px;
padding:12px 14px;
color:#fff;
font-size:14px;
outline:none;
}

.form-group input::placeholder{
color:rgba(255,255,255,0.35);
}

/* BUTTON */

.btn{
width:100%;
padding:13px;
background:#1A56DB;
color:#fff;
border:none;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
margin-top:6px;
}

.btn:active{
transform:scale(.98);
}

/* ERROR */

.error{
font-size:12px;
color:#F87171;
margin-top:8px;
text-align:center;
display:none;
}

/* ================= DASHBOARD (unchanged) ================= */

nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
padding:14px 18px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(11,31,74,0.95);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-logo{display:flex;align-items:center;gap:8px}

.nav-mark{
width:30px;
height:30px;
background:#1A56DB;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:13px;
}

.nav-name{font-size:13px;font-weight:600}
.nav-sub{font-size:9px;opacity:.45;letter-spacing:1px}

.nav-signout{
padding:6px 12px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:8px;
color:rgba(255,255,255,0.5);
font-size:12px;
cursor:pointer;
}

/* MOBILE OPTIMIZATION */

@media(max-width:480px){

.card{
padding:22px 18px;
}

.card-title{
font-size:17px;
}

.form-group input{
padding:11px 13px;
}

.btn{
padding:12px;
}

}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<div class="video-bg">
<video autoplay muted loop playsinline>
<source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260307_083826_e938b29f-a43a-41ec-a153-3d4730578ab8.mp4" type="video/mp4">
</video>
</div>

<div class="video-overlay"></div>

<!-- LOGIN -->
<div class="login-page" id="loginPage">

<div class="logo">
<div class="logo-mark">Z</div>
<div>
<div class="logo-name">Zenith Foundation</div>
<div class="logo-sub">FOUNDER DASHBOARD</div>
</div>
</div>

<div class="card">

<div class="card-title">Founder Access</div>
<div class="card-sub">This dashboard is for Ambreen only.</div>

<div class="form-group">
<input type="password" id="pin" placeholder="Enter access PIN" onkeypress="if(event.key==='Enter')checkPin()">
</div>

<div class="error" id="pinError">Incorrect PIN. Try again.</div>

<button class="btn" onclick="checkPin()">Enter Dashboard</button>

</div>
</div>

<script>

const CORRECT_PIN = 'ambreeniscute';

function checkPin(){
const pin = document.getElementById('pin').value.trim();

if(pin === CORRECT_PIN){
localStorage.setItem('zenith_founder_auth','1');
location.reload();
}else{
document.getElementById('pinError').style.display='block';
}
}

</script>

</body>
</html>
